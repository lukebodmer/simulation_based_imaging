# multi_cube_1000_p2 Preset
# Multiple cubic inclusions with polynomial order 2 elements

[preset]
name = "multi_cube_1000_p2"
description = "Multiple cubic inclusions with polynomial order 2 elements"
base_config = "base_parameters.toml"
default_num_samples = 1000

[sweep.inclusion]
wave_speed_range = [4.0, 4.0]
density_range = [4.0, 4.0]
scaling_range = [
    [0.1, 0.2],
    [0.1, 0.2],
    [0.1, 0.2],
]
allow_rotation = false
allow_movement = false
is_sphere = false
is_ellipsoid_of_revolution = false
is_multi_cubes = true
is_cube_in_ellipsoid = false

[sweep.cubes]
quantity_range = [1, 3]
width_range = [0.1, 0.2]

[sweep.geometry]
boundary_buffer = 0.05

[fixed.sources]
number = 6
frequency = 6.0
amplitude = 1.0
radius = 0.05

[fixed.outer_material]
wave_speed = 2.0
density = 2.0

[fixed.mesh]
grid_size = 0.04
box_size = 1.0

[fixed.solver]
polynomial_order = 2
total_time = 2.0

[fixed.receivers]
sensors_per_face = 25

[fixed.output]
points = 10
energy = 200
save_last_timestep_only = true
